<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leo — Avano AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000; color: #00d4ff;
      font-family: 'Share Tech Mono', monospace;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px; animation: gridMove 20s linear infinite; pointer-events: none;
    }
    @keyframes gridMove { from{background-position:0 0} to{background-position:40px 40px} }
    .container { position: relative; display: flex; flex-direction: column; align-items: center; gap: 24px; z-index: 1; }
    .header { text-align: center; }
    .brand { font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 6px; color: rgba(0,212,255,0.3); text-transform: uppercase; }
    .name { font-family: 'Orbitron', monospace; font-size: 32px; font-weight: 900; letter-spacing: 8px; color: #00d4ff; text-shadow: 0 0 20px #00d4ff, 0 0 40px #00d4ff55; margin-top: 4px; }
    .orb-wrapper { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
    .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(0,212,255,0.12); }
    .ring-1 { width: 200px; height: 200px; animation: spin 20s linear infinite; border-top-color: rgba(0,212,255,0.5); }
    .ring-2 { width: 172px; height: 172px; animation: spin 14s linear infinite reverse; border-right-color: rgba(0,212,255,0.3); }
    .ring-3 { width: 144px; height: 144px; animation: spin 9s linear infinite; border-bottom-color: rgba(0,212,255,0.2); }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .orb {
      width: 110px; height: 110px; border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #003d66, #000d1a);
      border: 1px solid rgba(0,212,255,0.3);
      box-shadow: 0 0 20px rgba(0,212,255,0.15), inset 0 0 20px rgba(0,212,255,0.05);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.3s; position: relative; z-index: 2; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .orb-icon { font-size: 32px; }
    .orb.recording { background: radial-gradient(circle at 35% 30%, #660000, #1a0000); border-color: rgba(255,60,60,0.6); box-shadow: 0 0 40px rgba(255,60,60,0.5), inset 0 0 30px rgba(255,60,60,0.1); animation: orbPulse 0.8s ease-in-out infinite; }
    .orb.processing { background: radial-gradient(circle at 35% 30%, #664400, #1a0d00); border-color: rgba(255,165,0,0.5); box-shadow: 0 0 40px rgba(255,165,0,0.3); }
    .orb.speaking { background: radial-gradient(circle at 35% 30%, #004433, #001a0d); border-color: rgba(0,255,170,0.5); box-shadow: 0 0 40px rgba(0,255,170,0.4), inset 0 0 30px rgba(0,255,170,0.1); }
    @keyframes orbPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .waves { display: flex; align-items: center; gap: 3px; height: 30px; opacity: 0; transition: opacity 0.3s; }
    .waves.active { opacity: 1; }
    .wave-bar { width: 3px; background: #00ffaa; border-radius: 2px; animation: waveAnim 0.5s ease-in-out infinite; }
    .wave-bar:nth-child(1){height:6px;animation-delay:0s}
    .wave-bar:nth-child(2){height:14px;animation-delay:0.1s}
    .wave-bar:nth-child(3){height:22px;animation-delay:0.2s}
    .wave-bar:nth-child(4){height:14px;animation-delay:0.3s}
    .wave-bar:nth-child(5){height:6px;animation-delay:0.4s}
    @keyframes waveAnim { 0%,100%{transform:scaleY(0.4);opacity:0.5} 50%{transform:scaleY(1);opacity:1} }
    .status-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #222; transition: all 0.3s; }
    .status-dot.recording { background: #ff3c3c; box-shadow: 0 0 8px #ff3c3c; }
    .status-dot.processing { background: #ffa500; box-shadow: 0 0 8px #ffa500; }
    .status-dot.speaking { background: #00ffaa; box-shadow: 0 0 8px #00ffaa; }
    .status-dot.ready { background: #00d4ff; box-shadow: 0 0 8px #00d4ff; }
    .status { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(0,212,255,0.3); transition: color 0.3s; }
    .status.recording { color: #ff3c3c; }
    .status.processing { color: #ffa500; }
    .status.speaking { color: #00ffaa; }
    .status.ready { color: #00d4ff; }
    .transcript-wrap { width: 280px; min-height: 60px; text-align: center; }
    .label { font-size: 8px; letter-spacing: 2px; color: rgba(0,212,255,0.2); text-transform: uppercase; margin-bottom: 4px; }
    .transcript { font-size: 12px; color: rgba(0,212,255,0.5); line-height: 1.6; }
    .reply { font-size: 13px; color: rgba(0,255,170,0.7); line-height: 1.6; margin-top: 8px; }
    .hint { font-size: 9px; color: rgba(0,212,255,0.2); letter-spacing: 2px; text-transform: uppercase; }
    .data-strip { display: flex; gap: 20px; font-size: 8px; letter-spacing: 2px; color: rgba(0,212,255,0.15); text-transform: uppercase; }
    .corner { position: fixed; width: 36px; height: 36px; border-color: rgba(0,212,255,0.15); border-style: solid; }
    .corner-tl { top: 16px; left: 16px; border-width: 1px 0 0 1px; }
    .corner-tr { top: 16px; right: 16px; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 16px; left: 16px; border-width: 0 0 1px 1px; }
    .corner-br { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; }
  </style>
</head>
<body>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="container">
    <div class="header">
      <div class="brand">Avano Technologies</div>
      <div class="name">LEO</div>
    </div>
    <div class="orb-wrapper">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="orb" id="orb"><span class="orb-icon" id="orbIcon">⬡</span></div>
    </div>
    <div class="waves" id="waves">
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
    </div>
    <div class="status-wrap">
      <div class="status-dot" id="dot"></div>
      <div class="status" id="status">Hold orb to speak</div>
    </div>
    <div class="transcript-wrap">
      <div class="label">You</div>
      <div class="transcript" id="transcript">—</div>
      <div class="label" style="margin-top:10px">Leo</div>
      <div class="reply" id="reply">—</div>
    </div>
    <div class="hint" id="hint">tap and hold · release to send</div>
    <div class="data-strip">
      <span>AZ-SPEECH</span>
      <span id="clock">--:--:--</span>
      <span>VP·AVANO</span>
    </div>
  </div>
  
  <script>
    setInterval(() => { document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8); }, 1000);

    const orb = document.getElementById('orb');
    const orbIcon = document.getElementById('orbIcon');
    const statusEl = document.getElementById('status');
    const dot = document.getElementById('dot');
    const transcriptEl = document.getElementById('transcript');
    const replyEl = document.getElementById('reply');
    const waves = document.getElementById('waves');

    let mediaRecorder = null, chunks = [], recording = false, stream = null;

    function setState(state, msg) {
      const map = {
        idle: ['', '⬡', 'Hold to speak', ''],
        recording: ['recording', '🔴', 'Recording...', 'recording'],
        processing: ['processing', '⏳', 'Thinking...', 'processing'],
        speaking: ['speaking', '🔊', 'Leo speaking', 'speaking'],
        ready: ['', '🎙️', 'Hold to speak', 'ready']
      };
      const [ocls, icon, status, dcls] = map[state] || map.idle;
      orb.className = 'orb ' + ocls;
      orbIcon.textContent = icon;
      statusEl.textContent = msg || status;
      statusEl.className = 'status ' + dcls;
      dot.className = 'status-dot ' + dcls;
      waves.classList.toggle('active', state === 'speaking');
    }

    async function startRecording() {
      if (recording) return;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        mediaRecorder.start(100);
        recording = true;
        setState('recording');
      } catch(err) {
        setState('idle', 'Mic error: ' + err.message);
      }
    }

    async function stopRecording() {
      if (!recording || !mediaRecorder) return;
      recording = false;

      await new Promise(resolve => { mediaRecorder.onstop = resolve; mediaRecorder.stop(); });
      stream.getTracks().forEach(t => t.stop());

      if (chunks.length === 0) { setState('idle'); return; }

      setState('processing');
      transcriptEl.textContent = '...';
      replyEl.textContent = '...';

      try {
        const blob = new Blob(chunks, { type: 'audio/webm' });
        const res = await fetch('/voice', { method: 'POST', headers: { 'Content-Type': 'audio/webm' }, body: blob });
        const data = await res.json();

        if (data.error) { replyEl.textContent = data.error; setState('ready'); return; }

        transcriptEl.textContent = data.transcript || '—';
        replyEl.textContent = data.reply || '—';

        if (data.audio) {
          setState('speaking');
          const bytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
          const audioBlob = new Blob([bytes], { type: 'audio/mp3' });
          const url = URL.createObjectURL(audioBlob);
          const audio = new Audio(url);
          audio.onended = () => { URL.revokeObjectURL(url); setState('ready'); };
          audio.onerror = () => setState('ready');
          await audio.play().catch(() => setState('ready'));
        } else {
          setState('ready');
        }
      } catch(err) {
        replyEl.textContent = 'Error: ' + err.message;
        setState('ready');
      }
    }

    // Single unified handler
    orb.addEventListener('pointerdown', async (e) => {
      e.preventDefault();
      orb.setPointerCapture(e.pointerId);
      await startRecording();
    });

    orb.addEventListener('pointerup', async (e) => {
      e.preventDefault();
      await stopRecording();
    });

    orb.addEventListener('pointercancel', async (e) => {
      await stopRecording();
    });

    setState('idle');
  </script>

</body>
</html>
